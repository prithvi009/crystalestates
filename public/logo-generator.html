<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Instagram Profile Logo - Square with monogram */
  .logo-profile {
    width: 1080px;
    height: 1080px;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .logo-profile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(198,169,98,0.08) 0%, transparent 70%);
  }

  /* Subtle grid pattern */
  .logo-profile::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(198,169,98,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(198,169,98,0.4) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .logo-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .monogram-box {
    width: 280px;
    height: 280px;
    border: 3px solid #C6A962;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .monogram-box::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(198,169,98,0.3);
    border-radius: 16px;
  }

  .monogram-svg {
    width: 200px;
    height: 200px;
  }

  .brand-name {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: #FFFFFF;
    text-align: center;
  }

  .tagline {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: #C6A962;
    text-align: center;
    margin-top: -24px;
  }

  /* Gold accent line */
  .accent-line {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #C6A962, transparent);
    border-radius: 2px;
    margin-top: -12px;
  }

  /* === VARIANT 2: Compact logo for profile picture === */
  .logo-compact {
    width: 800px;
    height: 800px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    margin-top: 80px;
  }

  .logo-compact::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(198,169,98,0.1) 0%, transparent 70%);
  }

  .compact-box {
    position: relative;
    z-index: 1;
    width: 400px;
    height: 400px;
    border: 4px solid #C6A962;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .compact-box::after {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1.5px solid rgba(198,169,98,0.35);
    border-radius: 22px;
  }

  .compact-svg {
    width: 280px;
    height: 280px;
  }

  /* === VARIANT 3: Full brand logo (landscape) === */
  .logo-landscape {
    width: 1080px;
    height: 540px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    position: relative;
    overflow: hidden;
    margin-top: 80px;
  }

  .logo-landscape::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(198,169,98,0.06) 0%, transparent 70%);
  }

  .landscape-left {
    position: relative;
    z-index: 1;
  }

  .landscape-box {
    width: 180px;
    height: 180px;
    border: 2.5px solid #C6A962;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .landscape-box::after {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(198,169,98,0.3);
    border-radius: 10px;
  }

  .landscape-right {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .landscape-name {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #FFFFFF;
  }

  .landscape-tagline {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: #C6A962;
  }

  .landscape-divider {
    width: 60px;
    height: 2px;
    background: #C6A962;
    border-radius: 1px;
  }

  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    font-family: 'Inter', sans-serif;
  }

  h2 {
    color: #888;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 80px;
    margin-bottom: 16px;
  }
  h2:first-of-type { margin-top: 0; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<h2>1. Instagram Post / Story Logo (1080x1080)</h2>
<div class="logo-profile" id="logo-main">
  <div class="logo-content">
    <div class="monogram-box">
      <svg class="monogram-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 14C17.5 14 14 16.5 14 22C14 27.5 17.5 30 20 30" stroke="#C6A962" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <path d="M24 14H31M24 22H29M24 30H31M24 14V30" stroke="#C6A962" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="accent-line"></div>
    <div class="brand-name">CRYSTAL ESTATES</div>
    <div class="tagline">PREMIUM REAL ESTATE CONSULTANCY</div>
  </div>
</div>

<h2>2. Profile Picture (800x800)</h2>
<div class="logo-compact" id="logo-profile">
  <div class="compact-box">
    <svg class="compact-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 14C17.5 14 14 16.5 14 22C14 27.5 17.5 30 20 30" stroke="#C6A962" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M24 14H31M24 22H29M24 30H31M24 14V30" stroke="#C6A962" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
</div>

<h2>3. Landscape Logo for Stories/Headers (1080x540)</h2>
<div class="logo-landscape" id="logo-landscape">
  <div class="landscape-left">
    <div class="landscape-box">
      <svg width="120" height="120" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 14C17.5 14 14 16.5 14 22C14 27.5 17.5 30 20 30" stroke="#C6A962" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <path d="M24 14H31M24 22H29M24 30H31M24 14V30" stroke="#C6A962" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <div class="landscape-right">
    <div class="landscape-name">CRYSTAL ESTATES</div>
    <div class="landscape-divider"></div>
    <div class="landscape-tagline">PREMIUM REAL ESTATE CONSULTANCY</div>
  </div>
</div>

</body>
</html>
